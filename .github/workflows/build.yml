name: Build (Linux, Windows, macOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure and build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          rm -rf build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # -A x64 is only valid for Visual Studio generators; the default on windows-latest
      # is often Ninja, which makes configure fail unless the generator is explicit.
      - name: Configure and build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Configure and build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          rm -rf build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run executable (Linux)
        if: matrix.os == 'ubuntu-latest' && success()
        run: ./build/cog_soc_env_space

      - name: Run executable (Windows)
        if: matrix.os == 'windows-latest' && success()
        run: ./build/Release/cog_soc_env_space.exe

      - name: Run executable (macOS)
        if: matrix.os == 'macos-latest' && success()
        run: ./build/cog_soc_env_space

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: cog_soc_env_space-${{ matrix.name }}
          path: build/cog_soc_env_space

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: cog_soc_env_space-${{ matrix.name }}
          path: build/Release/cog_soc_env_space.exe

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: cog_soc_env_space-${{ matrix.name }}
          path: build/cog_soc_env_space
